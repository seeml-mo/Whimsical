
<!DOCTYPE html>
<html>
<head>
  <title>Form Example</title>
  <!-- external stylesheet -->
  <!-- <link rel="stylesheet" href="./form_css.css"/> -->

  <style>
    input[type="checkbox"]:invalid {
      outline: 2px solid red; /* red outline for invalid checkbox */
    }
  </style>
</head>
<body>
  
  <form method="post" id="myForm" onsubmit="return validateForm()"> <!--id and onsubmit for JS-->
    <input type="text" 
           name="LoginName" 
           value="Initial Value">  <!-- name is for server -->
      <br>
    <input type="password" 
           name="Pass"> <!-- password type will not display user input-->
      <br>
    <textarea name="name" 
              cols="25" rows="5">
    Initial text to 
    appear
    in the text area. 
    </textarea>

    
      <br>
      <!-- different input control elements -->
      <hr>
    Email: <input type="email", name="email_address">
      <br>
    Search: <input type="search", name="search">
      <br>
    Tel: <input type="tel", name="tel_number"> 
      <br>
    URL: <input type="url", name="url_link">
      <br>
    Color: <input type="color", name="color_pick">
      <br>
    Date: <input type="date", name="date_pick">
      <br>
      <hr>
      <!-- list of option items -->
    <input type="checkbox"
     name="web" checked> Web<br> <!-- pre-assigned check -->
    <input type="checkbox"
     name="design"> Design<br>
    <input type="checkbox"
     name="code"> Code
    <br>
      <hr>
    <input type="radio" name="lang" 
     value="Java"> Java<br>  <!-- radio is grouped as a set with the name attribute -->
    <input type="radio" name="lang" 
     value="C++"> C++<br>
    <input type="radio" name="lang" 
     value="JS" checked> JS
      <br>
     <!--More input control--> 
      <hr>
    Read Only: <input type="text" value="i am a read-only text" readonly>
      <br>
    Disabled: <input type="text" value="i am a disabled text" disabled>  
      <br>
    Required: <input type="text" value="this field must be filled out" required>  
      <br>
    Auto-focused filed: <input type="text" value="start here" autofocus>  
      <hr>
      <br>
      <!--More list of option-->
      <input type="radio" id="html" name="fav_language" value="HTML">
      <label for="html">HTML</label><br> <!--make the text as a button-->
      <input type="radio" id="css" name="fav_language" value="CSS">
      <label for="css">CSS</label><br>
      <input type="radio" id="javascript" name="fav_language" value="JavaScript">
      <label for="javascript">JavaScript</label>
      <br>
      <hr>
      <!--More list of option-->
    <select name="language">
      <option value="C">C</option> 
      <option value="C++">C++</option>
      <option value="Java" >Java</option>
      <option value="JavaScript" selected>		JavaScript</option>
      <option value="SQL">SQL</option>
    </select>
    <br>
      <hr>
      <!--group-->
    <fieldset>
      <legend>Choose your interests</legend>
      <div>
        <input type="checkbox" id="coding" name="interest_coding">
        <label for="coding">Coding</label>
      </div>
      <div>
        <input type="checkbox" id="football" name="interest_football">
        <label for="football">football</label>
      </div>
    </fieldset>
    <!--checkbox with JS-->
    <input type="checkbox" id="agreeCheckbox"> <!--required, or otherwise it is always valid-->
    <label for="agreeCheckbox">I agree to the terms and conditions</label>
    <!--buttons-->
    <br>
    <button type="button">Simple button</button><br>
    <button type="reset">Reset button</button><br>
    <button type="submit">Submit button</button>
    
    </form>
    

<script>
function validateForm() {
  var checkbox = document.getElementById("agreeCheckbox");
  if (!checkbox.checked) {
    alert("Please agree to the terms and conditions.");
    return false; // Prevent form submission
  }
}
</script>


</body>
</html>
