<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./style.css">
    <title>iihiyori_sunshine</title>
  </head>
  <script src="comment.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
  <body>
   <h1>TS 测试页面</h1>

  <!-- 引入编译后的JavaScript -->
  <script src="ts_test.js"></script>
      <p class="bottom_link"> Click to know more about
        <a href="https://ensemble-stars.jp/characters/tomoe_hiyori"> Tomoe Hiyori</a> 
      </p>
      <div class="container">
        <nav class="navbar navbar-expand-lg sidebar">
          <img class="avatar" src="./images/Hiyori_Tomoe_4.jpg" />
              <ul>
                <li><a href="#home" aria-label="Home">
                <!-- Home icon (SVG) -->
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                HOME
                </a></li>
                <li><a href="#about" aria-label="About">
                <!-- User icon (SVG) -->
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z"/></svg>
                ABOUT
                </a></li>
                <li><a href="#" id="show-tasks-btn" aria-label="Show">
                <!-- Eye icon (SVG) -->
                <svg class="eye-open" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 6a9.77 9.77 0 0 1 8.485 4.485 9.77 9.77 0 0 1 0 8.485A9.77 9.77 0 0 1 12 22a9.77 9.77 0 0 1-8.485-4.485 9.77 9.77 0 0 1 0-8.485A9.77 9.77 0 0 1 12 6zm0 2a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/></svg>
                SHOW
                </a></li>
                <li><a href="#comment" aria-label="Contact">
                <!-- Mail icon (SVG) -->
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                COMMENT
                </a></li>
              </ul>
        </nav>
        <div id="show" class="bar" style="display:none;">
        </div>
        <article class="content"></article>
      </div>
    <script>
    (function() {
      const navLinks = document.querySelectorAll('nav.sidebar ul li a');
      const contentArea = document.querySelector('article.content');

      const routes = {
        home: `
          <header>
            <h1>Home Page</h1>
            <p>Welcome to the homepage.</p>
          </header>
          <section>
            <h1>Intro</h1>
            <p>This is the home section content.</p>
          </section>`,
        about: `
          <header>
            <h1>About Us</h1>
            <p>Posted by John Doe</p>
            <p>Some additional information about us.</p>
          </header>
          <section>
            <h1>Team</h1>
            <table>
              <tbody>
                <tr><th>Organization</th><th>Status</th></tr>
                <tr><td>Eden</td><td>Second-in-command</td></tr>
                <tr><td>Eve</td><td>Leader</td></tr>
              </tbody>
            </table>
          </section>`,
        comment: `
          <header>
            <h1>Comments</h1>
            <p>Leave your comments below.</p>
          </header>
          <section>
            <p>Comment section content.</p>
            <body>
          <div class="container-grid-container">
            <div id="comments"> 
              <div id="c1001" class="d-flex"> <!-- flex layout -->
                <div class="flex-shrink-0"> <!-- disallow div to shrink when page gets smaller -->
                  <svg height="100" width="100">
                    <circle cx="50" cy="50" r="40" fill="green"></circle>
                  </svg>
                </div>
                <div class="flex-grow-1"> <!-- allow div to grow and take up all space -->
                  <h5>seeml-mo@link.cuhk.edu.hk</h5>
                  <p>Ensemble Stars!!</p>
                </div>
              </div>
            </div>
            <form>
              <div class="mb-3">
                <label for="new-email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="new-email" placeholder="name@example.com">
              </div>
              <div class="mb-3">
                <label for="new-comment" class="form-label">Comment</label>
                <textarea class="form-control" id="new-comment" rows="3" placeholder="Ensemble Stars!!"></textarea>
              </div>
              <div class="form-check">
                  <input class="form-check-input" type="radio" name="new-color" id="new-color-red" value="red">
                  <label class="form-check-label" for="new-color-red">Red</label>
              </div>
              <div class="form-check">
                  <input class="form-check-input" type="radio" name="new-color" id="new-color-green" value="green">
                  <label class="form-check-label" for="new-color-green">Green</label>
              </div>
              <div class="form-check">
                  <input class="form-check-input" type="radio" name="new-color" id="new-color-yellow" value="yellow">
                  <label class="form-check-label" for="new-color-yellow">Yellow</label>
              </div>
              <div class="form-check">
                  <input class="form-check-input" type="radio" name="new-color" id="new-color-blue" value="blue">
                  <label class="form-check-label" for="new-color-blue">Blue</label>
              </div>
                <!-- TODO: Add more choices here with div/input/label -->
              <button type="button" class="btn btn-primary" onclick="processform();">Add comment</button>
              <button type="button" class="btn btn-primary" onclick="loadfile()">Load File</button>
              <button type="button" class="btn btn-primary" onclick="savefile()">Save File</button>
            </form>
            <div id="comments-container">
              <!-- 新增的评论会出现在这里 -->
            </div>
          </section>`
      };

      function render() {
        let hash = location.hash.slice(1) || 'home'; 
        if (!routes[hash]) {
          hash = 'home'; 
        }

        contentArea.innerHTML = routes[hash];

        navLinks.forEach(link => {
          if (link.getAttribute('href') === '#' + hash) {
            link.classList.add('active');
          } else {
            link.classList.remove('active');
          }
        });
      }

      window.addEventListener('hashchange', render);

      render();
    })();
    </script>
  </body>
</html>
