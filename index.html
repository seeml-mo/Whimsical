      <p class="bottom_link"> Click to know more about

    <script>
    (function() {
      const navLinks = document.querySelectorAll('nav.sidebar ul li a');
      const contentArea = document.querySelector('article.content');

      const routes = {
        home: `
          <header>
            <h1>Homepage</h1>
            <p>      Welcome to the Garden of EDEN</p>
          </header>
          <section>

            <div class="about-content-wrapper">
            <div class="row">  <!-- add Bootstrap row -->
            <div class="col-md-8">  
                <div class="about-text-content">

                        <div class="character-quote-wrapper">
                  <blockquote>
                      <p>I'm Hiyori Tomoe from Eden and Eve at COSMIC PRODUCTION! Well, there's no way you don't know who I am...♪ Bringing dazzling smiles and love to all my fans is my greatest happiness and a given as an idol. I promise to provide anyone who comes to see me with the best day ever. Yes, yes, that's a Good Hiyori☆</p>
                  </blockquote>
                  <cite class="character-quote-audio character-quote-audio-self">
                    <aside>
                      <span class="audio-button character-audio">
                          <span class="mw-default-size">
                              <audio src="./images/voices/Hiyori_Tomoe_Voice_Sample_1_ES.ogg" width="180" style="max-width: 100%; width: 180px;" controls>
                                  Your browser does not support the audio element.
                              </audio>
                          </span>
                      </span>
                    </aside>
                       <span class="character-audio-name">Hiyori</span>
                    <span>
                        <img src="./images/Hiyori_Tomoe_4.png" alt="Hiyori Tomoe" />
                    </span>
                  </cite>
              </div>
                        <div class="character-quote-wrapper">
                <blockquote>
                    <p>Ohii-san's introduction, huh. Ohii-san and I met at the idol training school, Reimei Academy, and he's the one who picked me up and saved me from rotting away in a garbage dump. He's free-spirited and prideful, but if it weren't for him, I wouldn't be here... when I think about it, his bits of selfishness can be kinda cute. Haha, saying that might make him angry at me though♪</p>
                </blockquote>
                <cite class="character-quote-audio character-quote-audio-friend">
                  <aside>  
                    <span class="audio-button character-audio">
                        <span class="mw-default-size">
                            <audio src="./images/voices/Jun_Sazanami_Voice_Sample_2_ES.ogg" width="180" style="max-width: 100%; width: 180px;" controls>
                                Your browser does not support the audio element.
                            </audio>
                        </span>
                    </span>
                  </aside>
                    <span class="character-audio-name"><a href="https://ensemble-stars.jp/characters/sazanami_jun">Jun</a></span>
                    <span>
                        <img src="./images/Jun_ES.png" alt="Jun Sazanami" />
                    </span>
                </cite>
            </div>
          </div>
        </div>

<div class="col-md-4"> 
<div class="image-sidebar">
    <div class="image-tabs">
  <div class="image-tabs">
    <div class="tab-scroll-container">
      <button class="scroll-btn scroll-left"><</button>
    <!-- tab div -->
    <div class="tab-headers">
        <button class="tab-header active" data-tab="current">Current</button>
        <button class="tab-header" data-tab="casual1">Casual 1</button>
        <button class="tab-header" data-tab="casual2">Casual 2</button>
        <button class="tab-header" data-tab="casual3">Casual 3</button>
        <button class="tab-header" data-tab="casual4">Casual 4</button>
        <button class="tab-header" data-tab="child">Childhood</button>
        <button class="tab-header" data-tab="bkubstars">Bkubstars</button>
    </div>

    <button class="scroll-btn scroll-right">></button>
  </div>
    
    <!-- tab content -->
    <div class="tab-contents">
        <!-- Current -->
        <div class="tab-content active" id="current">
            <figure class="pi-item pi-image">
                <img src="./images/Hiyori_Tomoe_4.png" class="image-thumbnail" alt="Current" />
            </figure>
        </div>
        
        <!-- Casual 1 -->
        <div class="tab-content" id="casual1">
            <figure class="pi-item pi-image">
                <img src="./images/(The_Lively_Room)_Hiyori_Tomoe_Full_Render_Bloomed.png" class="image-thumbnail" alt="Casual 1" />
            </figure>
        </div>
        
        <!-- Casual 2 -->
        <div class="tab-content" id="casual2">
            <figure class="pi-item pi-image">
                <img src="./images/(Balance_Game)_Hiyori_Tomoe_Full_Render.png" class="image-thumbnail" alt="Casual 2" />
            </figure>
        </div>
        
        <!-- Casual 3 -->
        <div class="tab-content" id="casual3">
            <figure class="pi-item pi-image">
                <img src="./images/(Swept Droplet) Hiyori Tomoe Full Render.png" class="image-thumbnail" alt="Casual 3" />
            </figure>
        </div>
        
        <!-- Casual 4 -->
        <div class="tab-content" id="casual4">
            <figure class="pi-item pi-image">
                <img src="./images/Hiyori Tomoe Casual 2 (Autumn-Winter) Outfit.png" class="image-thumbnail" alt="Casual 4" />
            </figure>
        </div>
        
        <!-- Child -->
        <div class="tab-content" id="child">
            <figure class="pi-item pi-image">
                <img src="./images/(The Teller of Mythos) Hiyori Tomoe Full Render.png" class="image-thumbnail" alt="Child" />
            </figure>
        </div>
        
        <!-- Bkubstars -->
        <div class="tab-content" id="bkubstars">
            <figure class="pi-item pi-image">
                <img src="./images/Hiyori Tomoe Bkubstars.png" class="image-thumbnail" alt="Bkubstars" />
            </figure>
        </div>
    </div>
  </div>
  </div>
  </div>
  </div>
  </div>
  </div>
  </div>
          </section>`,
        about: `
          <header>
            <h1>About Us</h1>
            <p>Good hiyori!!!</p>
          </header>
          <section>
            <h1>Relationship</h1>
          
    <table class="agency-unit-table">
      <thead>
        <tr>
          <th>Agency</th>
          <th class="divider-column"></th>
          <th>Unit</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>
            <img src="./images/COSMIC_PRODUCTION_Logo.webp" alt="COSMIC PRODUCTION" />
          </td>
          <td class="divider-column"></td>
          <td>
            <div class="unit-cell">
              <img src="./images/Eden_ES_Logo.webp" alt="Eden" />
              <div class="unit-divider"></div>
              <img src="./images/Eve_logo_cropped.webp" alt="Eve" />
            </div>
          </td>
        </tr>
      </tbody>
    </table>
          </section>`,
        comment: `
          <header>
            <h1>Comments</h1>
            <p>Leave your comments below.</p>
          </header>
          <section>
            <p>Comment section content.</p>
            <body>
          <div class="container-grid-container">
            <div id="comments"> 
              <div id="c1001" class="d-flex"> <!-- flex layout -->
                <div class="flex-shrink-0"> <!-- disallow div to shrink when page gets smaller -->
                  <svg height="100" width="100">
                    <circle cx="50" cy="50" r="40" fill="green"></circle>
                  </svg>
                </div>
                <div class="flex-grow-1"> <!-- allow div to grow and take up all space -->
                  <h5>seeml-mo@link.cuhk.edu.hk</h5>
                  <p>Ensemble Stars!!</p>
                </div>
              </div>
            </div>
            <form>
              <div class="mb-3">
                <label for="new-email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="new-email" placeholder="name@example.com">
              </div>
              <div class="mb-3">
                <label for="new-comment" class="form-label">Comment</label>
                <textarea class="form-control" id="new-comment" rows="3" placeholder="Ensemble Stars!!"></textarea>
              </div>
              <div class="form-check">
                  <input class="form-check-input" type="radio" name="new-color" id="new-color-red" value="red">
                  <label class="form-check-label" for="new-color-red">Red</label>
              </div>
              <div class="form-check">
                  <input class="form-check-input" type="radio" name="new-color" id="new-color-green" value="green">
                  <label class="form-check-label" for="new-color-green">Green</label>
              </div>
              <div class="form-check">
                  <input class="form-check-input" type="radio" name="new-color" id="new-color-yellow" value="yellow">
                  <label class="form-check-label" for="new-color-yellow">Yellow</label>
              </div>
              <div class="form-check">
                  <input class="form-check-input" type="radio" name="new-color" id="new-color-blue" value="blue">
                  <label class="form-check-label" for="new-color-blue">Blue</label>
              </div>
                <!-- TODO: Add more choices here with div/input/label -->
              <button type="button" class="btn btn-primary" onclick="processform();">Add comment</button>
              <button type="button" class="btn btn-primary" onclick="loadfile()">Load File</button>
              <button type="button" class="btn btn-primary" onclick="savefile()">Save File</button>
            </form>
            <div id="comments-container">
              <!-- New comments will be shown here -->
            </div>
          </section>
          <footer id="duration-timer-footer"></footer>`
      };

      let durationTimerInstance = null;

      function render() {
        let hash = location.hash.slice(1) || 'home'; 
        if (!routes[hash]) {
          hash = 'home'; 
        }

        contentArea.innerHTML = routes[hash];

      setTimeout(() => {
        initAudioPlayers(); 
      }, 100);

        navLinks.forEach(link => {
          if (link.getAttribute('href') === '#' + hash) {
            link.classList.add('active');
          } else {
            link.classList.remove('active');
          }
        });

           if (hash === 'comment') {
              const footer = document.getElementById('duration-timer-footer');
              if (footer) {
                if (durationTimerInstance) {
                  durationTimerInstance.stop();
                }
                durationTimerInstance = new DurationTimer(footer);
                durationTimerInstance.start();
              }
            } else {
              if (durationTimerInstance) {
                durationTimerInstance.stop();
                durationTimerInstance = null;
              }
            }
        }

      window.addEventListener('hashchange', render);

      render();
    })();
    </script>
  </body>
</html>
